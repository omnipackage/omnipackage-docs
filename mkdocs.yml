site_name: OmniPackage documentation
site_url: "https://docs.omnipackage.org"
repo_url: "https://github.com/omnipackage/omnipackage-docs"
site_description: "Reference, guides, and CLI docs for OmniPackage — build signed RPM and DEB packages for multiple Linux distros from one YAML config."
site_author: "Oleg Antonyan"

nav:
  - Home: index.md
  - "Getting started": getting_started.md
  - Guides:
      - "How it works": guides/how_it_works.md
      - "Signing packages": guides/signing.md
      - "Publishing to S3": guides/s3_repository.md
      - "Publishing to a local directory": guides/localfs_repository.md
      - Templates: guides/templates.md
      - "Build recipes": guides/build_recipes.md
      - "CI/CD integration": guides/cicd.md
      - "Best practices": guides/best_practices.md
      - Troubleshooting: guides/troubleshooting.md
  - Configuration:
      - Overview: configuration/index.md
      - builds: configuration/builds.md
      - version_extractors: configuration/version_extractors.md
      - repositories: configuration/repositories.md
      - image_caches: configuration/image_caches.md
      - secrets: configuration/secrets.md
      - ignore_source_files: configuration/ignore_source_files.md
  - "CLI reference":
      - Overview: cli/index.md
      - init: cli/init.md
      - build: cli/build.md
      - publish: cli/publish.md
      - release: cli/release.md
      - info: cli/info.md
      - gpg: cli/gpg.md
      - portal: cli/portal.md
      - prime: cli/prime.md
  - "Supported distros": distros.md
  - Examples: examples.md

extra:
  agent_github_url: https://github.com/omnipackage/omnipackage-rs/
  examples_github_url: https://github.com/omnipackage/examples
  agent_public_install_url: https://repositories.omnipackage.org/omnipackage-rs/stable/install.html

theme:
  name: material
  favicon: img/favicon.ico
  logo: img/logo.png
  font: false
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default # (1)!
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
      primary: white
      accent: custom

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to system preference
      primary: black
      accent: custom

  features:
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - search.share
    - navigation.tracking
    - navigation.sections

plugins:
  - social
  - search
  - privacy
  - git-revision-date-localized
  - macros
  - llmstxt:
      markdown_description: "OmniPackage is a CLI that drives standard Linux packaging tools (rpmbuild, debuild, createrepo_c, dpkg-scanpackages, gpg, podman/docker) from a single YAML config, so one project repo can ship signed RPM and DEB packages to many distros from a single `release` command."
      full_output: llms-full.txt
      sections:
        Getting started:
          - index.md: "Documentation home — what OmniPackage is, links into the rest of the site."
          - getting_started.md: "Install the CLI and build the bundled C example end-to-end."
        Guides:
          - guides/how_it_works.md: "Architecture overview — how the CLI orchestrates rpmbuild/debuild/createrepo_c/gpg/podman."
          - guides/signing.md: "GPG key generation, storing the key as a secret, and signing RPM/DEB packages and repository metadata."
          - guides/s3_repository.md: "Publishing the built repository to S3-compatible storage (AWS S3, Cloudflare R2, MinIO)."
          - guides/localfs_repository.md: "Publishing the built repository to a local directory with the localfs provider — for testing, same-machine installs, and self-hosting. S3 is not required."
          - guides/templates.md: "Liquid templating for the RPM .spec and DEB control files — per-distro values and shared snippets."
          - guides/build_recipes.md: "Build patterns for tricky projects — CMake/Qt, Electron, pacman — plus the Qt6 dependency map, patching staged source, and package verification."
          - guides/cicd.md: "Running OmniPackage in CI/CD — GitHub Actions matrix, caching, and the recommended release flow."
          - guides/best_practices.md: "Recommended patterns for production package pipelines."
          - guides/troubleshooting.md: "Diagnosing OmniPackage build failures — missing deps, unpackaged files, link/OOM errors, per-distro package-name lookup."
        Configuration:
          - configuration/index.md: "config.yml top-level keys and overall structure."
          - configuration/builds.md: "builds — per-distro build target definitions."
          - configuration/version_extractors.md: "version_extractors — strategies for stamping the package version."
          - configuration/repositories.md: "repositories — publishing targets (S3-compatible, local, etc.)."
          - configuration/image_caches.md: "image_caches — pre-built container images that skip setup on every build."
          - configuration/secrets.md: "secrets — passing values into the build without committing them."
          - configuration/ignore_source_files.md: "ignore_source_files — patterns excluded from the source tree before staging."
        CLI reference:
          - cli/index.md: "Overview of the omnipackage CLI subcommands."
          - cli/build.md: "omnipackage build — build packages without publishing."
          - cli/publish.md: "omnipackage publish — publish already-built packages to a repository."
          - cli/release.md: "omnipackage release — build and publish in one step."
          - cli/info.md: "omnipackage info — query project metadata; JSON output drives CI matrices."
          - cli/gpg.md: "omnipackage gpg — generate and inspect signing keys."
          - cli/portal.md: "omnipackage portal — open an interactive shell inside the build container for debugging."
          - cli/prime.md: "omnipackage prime — populate image caches."
        Reference:
          - distros.md: "Supported DEB/RPM distributions and their distro IDs."
          - examples.md: "Real-world projects and one-per-language minimal templates."

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - footnotes
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - fenced_code
